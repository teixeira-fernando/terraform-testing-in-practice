name: Frontend Review - Pull Request
on:
  pull_request:
    branches: ["main"]
jobs:
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: |
          cd frontend-review
          npm ci
      - name: Install Playwright Browsers
        run: |
          cd frontend-review
          npx playwright install --with-deps
      - name: Build
        run: |
          cd frontend-review
          npm run build
      - name: Test - unit tests
        run: |
          cd frontend-review
          npm test
      - name: Create Docker network
        run: docker network create ls-network
      - name: Start LocalStack with Terraform Init Hooks
        run: |
          docker run -d \
            --name localstack \
            --network ls-network \
            -p 4566:4566 \
            -e LOCALSTACK_AUTH_TOKEN=${{ secrets.LOCALSTACK_AUTH_TOKEN }} \
            -e EXTENSION_AUTO_INSTALL=localstack-extension-terraform-init \
            -v $(pwd)/terraform:/etc/localstack/init/ready.d \
            localstack/localstack-pro:4.10.0
      - name: Wait for LocalStack and init hooks
        run: |
          until docker logs localstack 2>&1 | grep -q "Ready."; do sleep 2; done
          echo "LocalStack with Terraform init hooks is ready"
      - name: Test - e2e tests
        run: |
          cd frontend-review
          npm run test:e2e:all-logs
      - name: Build Docker image
        run: |
          cd frontend-review
          docker buildx build --load -t teixeirafernando/frontend-review:pr-${{ github.run_number }} .
