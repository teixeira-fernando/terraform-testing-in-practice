name: Frontend Review - Pull Request
on:
  pull_request:
    branches: ["main"]
jobs:
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: |
          cd frontend-review
          npm ci
      - name: Install Playwright Browsers
        run: |
          cd frontend-review
          npx playwright install --with-deps
      - name: Build
        run: |
          cd frontend-review
          npm run build
      - name: Test - unit tests
        run: |
          cd frontend-review
          npm test
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
      - name: Create Docker network
        run: docker network create ls-network
      - name: Start LocalStack
        run: docker run -d --name localstack --network ls-network -p 4566:4566 localstack/localstack:4.10.0
      - name: Wait for LocalStack
        run: until docker logs localstack 2>&1 | grep -q "Ready."; do sleep 2; done
      - name: Terraform Init
        run: |
          cd terraform
          terraform init
      - name: Terraform Apply
        run: |
          cd terraform
          terraform apply -var-file=local.tfvars -auto-approve
      - name: Test - e2e tests
        run: |
          cd frontend-review
          npm run test:e2e:all-logs
      - name: Build Docker image
        run: |
          cd frontend-review
          docker buildx build --load -t teixeirafernando/frontend-review:pr-${{ github.run_number }} .
