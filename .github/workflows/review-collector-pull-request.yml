name: Review Collector - Continuous Integration

on:
  pull_request:
    paths:
      - 'review-collector/**'
    branches: ["main"]

jobs:
  build:

    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v7
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle
          settings-path: ${{ github.workspace }} # location for the settings.xml file

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@748248ddd2a24f49513d8f472f81c3a07d4d50e1 # v4.4.4

      - name: Build with Gradle
        run: ./gradlew :review-collector:build

      - name: Test with Gradle
        run: ./gradlew :review-collector:test

      - name: Generate coverage report
        run: ./gradlew :review-collector:jacocoTestReport
        continue-on-error: true

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: review-collector-coverage-report
          path: |
            review-collector/build/reports/jacoco/test/
            review-collector/build/jacoco/test.exec
          if-no-files-found: ignore

