services:
  redis:
    image: redis:7-alpine
    container_name: ministack-redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - ls

  ministack: # MiniStack container
    image: ministackorg/ministack
    container_name: ministack
    ports:
      - "4566:4566"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request, sys; urllib.request.urlopen('http://localhost:4566/_ministack/health') or sys.exit(1)"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    networks:
      - ls

  ministack-setup:
    image: amazon/aws-cli
    environment:
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_DEFAULT_REGION=us-east-1
    volumes:
      - ../ministack-setup.sh:/ministack-setup.sh
    entrypoint: ["/bin/sh", "/ministack-setup.sh"]
    depends_on:
      ministack:
        condition: service_healthy
    networks:
      - ls


  review-collector:
    image: teixeirafernando/review-collector:latest
    container_name: review-collector
    environment:
      AWS_ENDPOINT: http://ministack:4566
    depends_on:
      ministack-setup:
        condition: service_completed_successfully
    ports:
      - "8080:8080"
    networks:
      - ls

  review-analyzer:
    image: teixeirafernando/review-analyzer:latest
    container_name: review-analyzer
    environment:
      AWS_ENDPOINT: http://ministack:4566
    depends_on:
      ministack-setup:
        condition: service_completed_successfully
    ports:
      - "8081:8081"
    networks:
      - ls

  frontend-review:
    image: teixeirafernando/frontend-review:latest
    container_name: frontend-review
    depends_on:
      review-collector:
        condition: service_started
      review-analyzer:
        condition: service_started
    ports:
      - "3000:80"
    networks:
      - ls

networks:
  ls:
    driver: bridge